[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# Root of the repo must be first so "from backend.csrf import ..." resolves.
# Individual src sub-packages follow for the rest of the test suite.
pythonpath = . src src/model src/data src/api src/evaluation
